<!DOCTYPE html>
<html lang="PT-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog da Nanda</title>
</head>

<body>
    <header>
        <h1>Meu blog tech</h1>
        <p>Vou compartilhar conhecimentos sobre tecnologia e programação</p>
        <button>❤️<span>0</span></button>
        <button>👍<span>0</span></button>
        <style>
            header {
                background-color: #96bee9;
                color: #0a0000;
                text-align: center;
                max-width: 800px;
                margin: 0 auto;
            }

            main {
                background-color: #e49bee;
                color: #1a020f;

                width: 80px;
                height: 80px;
                display: flex
         }

         div p {
font-weight: bold;}

        </style>
    </header>
    <main>
        <img src="imagem-blog.png" 
        alt="logotipo conceitual de tecnologia e educação">
        <div class="artigo-autor">
        <h2>Meu primeiro post</h2>
        <p>Por: Fernanda</p>
        <p>Boas-vindas ao meu novo blog! Aqui vou compartilhar dicas de programação e curiosidades da área de
            tecnologia.</p>
        <button>❤️<span>0</span></button>
        <button>👍<span>0</span></button>
        </div>
    </main>
</body>
<script>
        const botao = document.querySelectorAll("button");

        botoes.forEach(function (botao) {
        let curtiu = false;
        botao.addEventListener("click", botaoClicado);
        function botaoClicado() {
            console.log("fui clicado");
            let texto = botao.querySelector("span");
            if (curtiu === false){
                texto.textContent++;
                curtiu = true;
            } else{
                texto.textContent--;
                curtiu = false;
            }
        }
    })
</script>
</html>
</body>
